<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AI Productivity Radar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=Geist:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<script type="application/json" id="embedded-tools-data">
{
  "updatedAt": "2026-05-08T12:00:00Z",
  "sources": [
    {"name": "Product Hunt", "url": "https://producthunt.com", "contribution": "upvotes"},
    {"name": "GitHub", "url": "https://github.com/trending", "contribution": "stars"}
  ],
  "trendMethodology": "Scor normalizat 0-100 bazat pe GitHub stars și Product Hunt upvotes.",
  "tools": [
    {"name": "ChatGPT", "cats": ["programare", "scris"], "price": "freemium", "country": "SUA", "region": "america", "tagline": "Asistent AI generalist.", "when": "Pentru orice workflow.", "url": "https://chatgpt.com", "trend": 92, "badges": ["popular"]},
    {"name": "Claude", "cats": ["programare"], "price": "freemium", "country": "SUA", "region": "america", "tagline": "AI cu raționament puternic.", "when": "Pentru documente lungi.", "url": "https://claude.ai", "trend": 88, "badges": ["documente"]}
  ]
}
</script>

<style>
:root{--bg:#0f0d0a;--surface:#1c1712;--text:#f4ede2;--gold:#d4a574;--serif:'Fraunces',serif;--sans:'Geist',sans-serif}
body{font-family:var(--sans);background:var(--bg);color:var(--text)}
.container{max-width:1200px;margin:0 auto;padding:0 20px}
.topnav{position:sticky;top:0;background:rgba(15,13,10,0.9);backdrop-filter:blur(10px);z-index:100;border-bottom:1px solid #333;padding:10px 0}
.topnav .container{display:flex;justify-content:space-between;align-items:center}
.brand{color:var(--gold);font-family:var(--mono);font-size:14px}
.navlinks{display:flex;gap:15px}
.navlinks a{color:var(--text);text-decoration:none;font-family:var(--mono);font-size:12px}
.theme-toggle{background:none;border:none;color:var(--text);cursor:pointer;font-size:18px}
header{padding:40px 0;border-bottom:1px solid #333}
h1{font-family:var(--serif);font-size:2.5rem;color:var(--gold)}
.lead{color:var(--text-muted);margin:10px 0 20px}
.tools-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px;margin:20px 0}
.tool-card{background:var(--surface);border:1px solid #333;border-radius:12px;padding:20px;cursor:pointer;transition:transform 0.2s}
.tool-card:hover{transform:translateY(-5px);border-color:var(--gold)}
.tool-name{font-family:var(--serif);font-size:1.5rem;margin-bottom:10px}
.tool-tagline{color:var(--text-muted);margin-bottom:15px}
.tool-actions{display:flex;gap:10px}
.modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.8);display:none;align-items:center;justify-content:center;z-index:1000}
.modal.show{display:flex}
.modal-card{background:var(--surface);border-radius:12px;padding:30px;max-width:600px;width:90%}
.modal-close{position:absolute;top:15px;right:15px;background:none;border:none;color:var(--text);cursor:pointer;font-size:24px}
@media(max-width:768px){.tools-grid{grid-template-columns:1fr}.tool-card{padding:15px}}
</style>
</head>
<body>
<nav class="topnav"><div class="container"><div class="brand">AI Radar</div><div class="navlinks"><a href="#">Home</a><button class="theme-toggle" id="themeToggle">🌓</button></div></div></nav>
<header><div class="container"><h1>AI Productivity Radar</h1><p class="lead">Găsește tool-ul potrivit</p></div></header>
<main class="container"><div class="tools-grid" id="toolsGrid"></div></main>
<div class="modal" id="toolDetailsModal"><div class="modal-card"><button class="modal-close" id="closeToolDetails">×</button><h2 id="toolDetailsName">Tool</h2><div id="toolDetailsContent"></div></div></div>
<script src="js/command-palette.js"></script>
<script src="js/related-tools.js"></script>
<script src="js/app.js"></script>
<script>
const tools=JSON.parse(document.getElementById('embedded-tools-data').textContent).tools;
function renderTools(){document.getElementById('toolsGrid').innerHTML=tools.map(t=>`<div class="tool-card" onclick="openToolDetails('${t.name}')"><div class="tool-name">${t.name}</div><p class="tool-tagline">${t.tagline}</p><div class="tool-actions"><a href="${t.url}">Link</a></div></div>`).join('')}
function openToolDetails(name){const tool=tools.find(t=>t.name===name);document.getElementById('toolDetailsName').textContent=tool.name;document.getElementById('toolDetailsContent').innerHTML=`<p>${tool.tagline}</p><p>${tool.when}</p>`;document.getElementById('toolDetailsModal').classList.add('show')}
function closeToolDetails(){document.getElementById('toolDetailsModal').classList.remove('show')}
document.getElementById('closeToolDetails').onclick=closeToolDetails;
document.addEventListener('click',e=>{if(e.target.classList.contains('modal'))closeToolDetails()});
renderTools();
if(typeof initCommandPalette==='function')initCommandPalette();
if(typeof initRelatedTools==='function')initRelatedTools();
if(typeof toggleTheme==='function')document.getElementById('themeToggle').onclick=toggleTheme;
</script>
</body>
</html>
