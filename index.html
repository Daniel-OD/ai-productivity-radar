<style>
:root {
  --bg: #0f0d0a;
  --bg-soft: #15110d;
  --surface: #1c1712;
  --surface-2: #241e17;
  --border: #2e2620;
  --border-strong: #44382d;
  --text: #f4ede2;
  --text-muted: #c9c4b8;
  --text-dim: #6e6354;
  --gold: #d4a574;
  --sage: #94b08c;
  --sage-bg: rgba(148, 176, 140, 0.12);
  --coral: #d97757;
  --coral-bg: rgba(217, 119, 87, 0.12);
  --blue: #7fa3bf;
  --blue-bg: rgba(127, 163, 191, 0.12);
  --serif: 'Fraunces', Georgia, serif;
  --sans: 'Geist', -apple-system, BlinkMacSystemFont, sans-serif;
  --mono: 'JetBrains Mono', 'SF Mono', monospace;
}

/* Light Theme */
.light-mode {
  --bg: #f8f9fa;
  --bg-soft: #f1f3f5;
  --surface: #ffffff;
  --surface-2: #e9ecef;
  --border: #dee2e6;
  --border-strong: #ced4da;
  --text: #212529;
  --text-muted: #6c757d;
  --text-dim: #495057;
  --gold: #ffc107;
  --sage: #28a745;
  --sage-bg: rgba(40, 167, 69, 0.12);
  --coral: #dc3545;
  --coral-bg: rgba(220, 53, 69, 0.12);
  --blue: #0d6efd;
  --blue-bg: rgba(13, 110, 253, 0.12);
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html {
  scroll-behavior: smooth;
}

body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  line-height: 1.5;
  background-image: 
    radial-gradient(ellipse 80% 50% at 50% -10%, rgba(212, 165, 116, 0.1), transparent 70%),
    radial-gradient(ellipse 60% 40% at 100% 50%, rgba(217, 119, 87, 0.05), transparent 70%);
  min-height: 100vh;
  transition: background 0.3s ease, color 0.3s ease;
}

.container {
  max-width: 1280px;
  margin: auto;
  padding: 0 32px;
}

/* Header */
.topnav {
  position: sticky;
  top: 0;
  z-index: 220;
  background: rgba(15, 13, 10, 0.82);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
}

.light-mode .topnav {
  background: rgba(248, 249, 250, 0.82);
}

.topnav .container {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 16px;
  padding-top: 12px;
  padding-bottom: 12px;
}

.brand {
  font-family: var(--mono);
  font-size: 12px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--gold);
}

.navlinks {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  align-items: center;
}

.navlinks a, .mini-btn {
  font-family: var(--mono);
  font-size: 11px;
  text-decoration: none;
  color: var(--text-muted);
  border: 1px solid var(--border);
  padding: 7px 10px;
  border-radius: 999px;
  background: transparent;
  cursor: pointer;
}

.navlinks a:hover, .mini-btn:hover {
  color: var(--gold);
  border-color: var(--gold);
}

/* Theme Toggle */
.theme-toggle {
  background: none;
  border: none;
  color: var(--text-muted);
  font-size: 18px;
  cursor: pointer;
  padding: 8px;
  border-radius: 8px;
  transition: all 0.2s;
}

.theme-toggle:hover {
  color: var(--gold);
  background: var(--bg-soft);
}

/* Header Content */
header {
  padding: 72px 0 42px;
  border-bottom: 1px solid var(--border);
}

.eyebrow {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 22px;
  display: flex;
  gap: 12px;
  align-items: center;
}

.eyebrow:before {
  content: '';
  width: 24px;
  height: 1px;
  background: var(--gold);
}

h1 {
  font-family: var(--serif);
  font-weight: 300;
  font-size: clamp(48px, 8vw, 94px);
  line-height: 0.95;
  letter-spacing: -0.03em;
  margin-bottom: 24px;
}

h1 em {
  font-style: italic;
  color: var(--gold);
}

.lead {
  font-family: var(--serif);
  font-size: clamp(18px, 2.2vw, 23px);
  color: var(--text-muted);
  max-width: 780px;
}

.hero-actions {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  margin-top: 30px;
}

.primary, .secondary {
  border: 1px solid var(--gold);
  border-radius: 999px;
  padding: 12px 18px;
  font-family: var(--mono);
  font-size: 12px;
  cursor: pointer;
  text-decoration: none;
}

.primary {
  background: var(--gold);
  color: var(--bg);
}

.secondary {
  background: transparent;
  color: var(--gold);
}

.meta-bar {
  display: flex;
  gap: 18px 26px;
  margin-top: 36px;
  flex-wrap: wrap;
  font-family: var(--mono);
  font-size: 12px;
  color: var(--text-dim);
}

.meta-bar strong {
  color: var(--text);
}

.data-status {
  border: 1px solid var(--border);
  border-radius: 999px;
  padding: 3px 8px;
  color: var(--text-muted);
  background: rgba(28, 23, 18, 0.5);
}

.light-mode .data-status {
  background: rgba(248, 249, 250, 0.5);
}

.data-status.ok {
  color: var(--sage);
  border-color: rgba(148, 176, 140, 0.45);
}

.data-status.warn {
  color: var(--gold);
  border-color: rgba(212, 165, 116, 0.45);
}

/* Panels */
.panel {
  background: linear-gradient(135deg, rgba(212, 165, 116, 0.08), rgba(127, 163, 191, 0.05));
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 28px;
}

.light-mode .panel {
  background: linear-gradient(135deg, rgba(212, 165, 116, 0.05), rgba(127, 163, 191, 0.02));
}

.section {
  padding: 54px 0;
}

.section-sub {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-bottom: 14px;
}

.section-title {
  font-family: var(--serif);
  font-size: clamp(30px, 4vw, 46px);
  font-weight: 300;
  margin-bottom: 12px;
}

.section-title em {
  color: var(--gold);
  font-style: italic;
}

.helper {
  color: var(--text-muted);
  font-size: 15px;
  line-height: 1.7;
  max-width: 760px;
}

/* Wizard Grid */
.wizard-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 10px;
  margin-top: 22px;
}

.choice, .trend-card {
  background: var(--bg-soft);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 16px;
  text-align: left;
  color: var(--text);
  cursor: pointer;
  transition: all 0.2s ease;
}

.light-mode .choice, .light-mode .trend-card {
  background: var(--surface);
}

.choice:hover, .choice.active, .trend-card:hover {
  border-color: var(--gold);
  background: var(--surface);
}

.light-mode .choice:hover, .light-mode .choice.active, .light-mode .trend-card:hover {
  background: var(--bg-soft);
}

.choice strong {
  display: block;
  font-family: var(--serif);
  font-size: 20px;
  font-weight: 400;
}

.choice span, .trend-card p {
  display: block;
  color: var(--text-muted);
  font-size: 13px;
  margin-top: 5px;
}

.recommendation {
  margin-top: 18px;
  color: var(--text-muted);
  font-size: 14px;
}

.recommendation strong {
  color: var(--gold);
}

/* Trending Strip */
.trending-strip {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 10px;
  margin-top: 24px;
}

.trend-card .score {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--gold);
  margin-bottom: 8px;
}

.trend-card h3 {
  font-family: var(--serif);
  font-weight: 400;
  font-size: 22px;
}

/* Stack Row */
.stack-row {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-top: 20px;
}

.stack-pill {
  border: 1px solid var(--border-strong);
  background: var(--surface);
  color: var(--text-muted);
  border-radius: 999px;
  padding: 8px 12px;
  font-family: var(--mono);
  font-size: 11px;
  cursor: pointer;
  transition: all 0.2s ease;
}

.stack-pill:hover {
  border-color: var(--gold);
  color: var(--gold);
}

/* Filters Section */
.filters-section {
  padding: 28px 0;
  position: sticky;
  top: 46px;
  background: rgba(15, 13, 10, 0.93);
  z-index: 180;
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  backdrop-filter: blur(10px);
  transition: transform 0.28s ease, opacity 0.22s ease;
}

.light-mode .filters-section {
  background: rgba(248, 249, 250, 0.93);
}

.filters-section.filters-hidden {
  transform: translateY(calc(-100% - 52px));
  opacity: 0;
  pointer-events: none;
}

/* Filters Drawer (Mobile) */
.filters-drawer {
  position: fixed;
  left: 0;
  right: 0;
  bottom: 0;
  top: auto;
  background: var(--surface);
  border-top: 1px solid var(--border-strong);
  border-radius: 12px 12px 0 0;
  padding: 20px;
  transform: translateY(100%);
  transition: transform 0.3s ease;
  z-index: 1000;
  max-height: 80vh;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}

.light-mode .filters-drawer {
  background: var(--surface);
}

.filters-drawer.visible {
  transform: translateY(0);
}

.filters-drawer-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.5);
  z-index: 999;
  display: none;
}

.filters-drawer-overlay.visible {
  display: block;
}

/* Filter Rows */
.filter-row {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 13px;
  flex-wrap: wrap;
}

.filter-label {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--text-dim);
  min-width: 90px;
}

.pills {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  flex: 1;
}

.pill {
  background: transparent;
  border: 1px solid var(--border-strong);
  color: var(--text-muted);
  padding: 7px 14px;
  border-radius: 100px;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s ease;
  min-height: 44px;
}

.pill:hover {
  border-color: var(--gold);
  color: var(--text);
}

.pill.active {
  background: var(--gold);
  border-color: var(--gold);
  color: var(--bg);
}

.count {
  opacity: 0.65;
  margin-left: 4px;
  font-family: var(--mono);
  font-size: 11px;
}

/* Search Row */
.search-row {
  display: flex;
  gap: 12px;
  align-items: center;
  flex-wrap: wrap;
}

.search-box {
  flex: 1;
  min-width: 240px;
  position: relative;
}

.search-box input {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border-strong);
  color: var(--text);
  padding: 12px 16px 12px 44px;
  border-radius: 6px;
  font-size: 14px;
}

.search-box:before {
  content: '⌕';
  position: absolute;
  left: 16px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-dim);
  font-size: 18px;
}

.sort-select, .reset-btn {
  background: var(--surface);
  border: 1px solid var(--border-strong);
  color: var(--text-muted);
  padding: 11px 14px;
  border-radius: 6px;
  font-family: var(--mono);
  font-size: 11px;
  cursor: pointer;
  min-height: 44px;
}

.reset-btn:hover {
  border-color: var(--coral);
  color: var(--coral);
}

.results-count {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--text-dim);
  margin-top: 14px;
}

.results-count strong {
  color: var(--gold);
}

/* Tools Section */
.tools-section {
  padding: 40px 0 80px;
}

.tools-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 16px;
}

/* Skeleton Loader */
.skeleton-card {
  background: var(--bg-soft);
  border: 1px solid var(--border);
  border-radius: 12px;
  height: 200px;
  animation: pulse 1.5s ease-in-out infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 0.6; }
  50% { opacity: 1; }
}

.skeleton-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 16px;
}
